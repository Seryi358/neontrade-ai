version: "3.8"

services:
  neontrade:
    build: .
    container_name: neontrade-ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - neontrade-data:/app/data
      - neontrade-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  neontrade-data:
  neontrade-logs:
